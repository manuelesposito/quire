<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quire — Navigation concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- the canonical foundation: this nav now CONSUMES @quire/tokens -->
<link rel="stylesheet" href="../../../packages/tokens/dist/css/variables.css">
<link rel="stylesheet" href="../../../packages/tokens/dist/css/dark.css">
<style>
:root{
  /* local aliases mapped onto the token foundation — no hardcoded design values */
  --canvas:      var(--qr-color-surface-canvas);
  --bar:         var(--qr-color-surface-nav);
  --item-active: var(--qr-color-state-active-surface);
  --hover:       var(--qr-color-state-hover);
  --logo:        var(--qr-color-text-default);
  --text:        var(--qr-color-text-default);
  --text-muted:  var(--qr-color-text-muted);
  --text-subtle: var(--qr-color-text-subtle);
  --border:      var(--qr-color-border-default);
  --ochre-soft:  var(--qr-color-accent-soft);
  --ochre:       var(--qr-color-accent-default);
  --sans:        var(--qr-font-family-sans);
  --mono:        var(--qr-font-family-mono);
  --serif:       var(--qr-font-family-serif);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--text);background:var(--canvas);font-size:var(--qr-font-size-400);line-height:var(--qr-font-line-height-normal);letter-spacing:var(--qr-font-letter-spacing-normal);-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}

/* monochrome masked marks — one ink colour, optically matched boxes */
.logo,.hlogo{background-color:var(--logo);
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
  -webkit-mask-position:center;mask-position:center;
  -webkit-mask-size:contain;mask-size:contain;display:block}
.logo.wp { width:24px;height:24px;-webkit-mask-image:url(logos/wp-mono.svg);     mask-image:url(logos/wp-mono.svg)}
.logo.woo{ width:21px;height:14px;-webkit-mask-image:url(logos/woo-w.svg);       mask-image:url(logos/woo-w.svg)}
.logo.jp { width:21px;height:21px;-webkit-mask-image:url(logos/jetpack-mono.svg);mask-image:url(logos/jetpack-mono.svg)}
.hlogo.wp { width:18px;height:18px;-webkit-mask-image:url(logos/wp-mono.svg);     mask-image:url(logos/wp-mono.svg)}
.hlogo.woo{ width:16px;height:11px;-webkit-mask-image:url(logos/woo-w.svg);       mask-image:url(logos/woo-w.svg)}
.hlogo.jp { width:16px;height:16px;-webkit-mask-image:url(logos/jetpack-mono.svg);mask-image:url(logos/jetpack-mono.svg)}

/* ---------- product rail (hairline divider, same colour as panel) ---------- */
.rail{width:var(--qr-size-rail);background:var(--bar);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;flex-shrink:0}
.rail .stack{display:flex;flex-direction:column;gap:4px;width:100%;align-items:center;flex:1}
.prod{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:0;cursor:pointer;padding:5px 0;width:100%}
.prod .sq{width:42px;height:42px;border-radius:var(--qr-radius-card);display:flex;align-items:center;justify-content:center;transition:background var(--qr-motion-control-duration) var(--qr-motion-control-easing)}
.prod:focus-visible .sq,.add:focus-visible .sq{outline:2px solid var(--qr-color-state-focus-ring);outline-offset:2px}
.prod .lbl{font-size:var(--qr-font-size-100);color:var(--text-subtle);letter-spacing:.01em}
.prod:hover .sq{background:var(--hover)}
.prod.active .sq{background:var(--qr-color-state-active-surface)}
.prod.active .logo{background-color:var(--qr-color-text-default)}   /* active mark = ink — ochre is the accent, not "where you are" */
.prod.active .lbl{color:var(--text);font-weight:500}
.add .sq{color:var(--text-subtle)}
.add:hover .sq{background:var(--hover);color:var(--text-muted)}
.add svg{width:18px;height:18px}
.rail .acct{width:30px;height:30px;border-radius:50%;background:var(--logo);color:var(--qr-color-text-inverse);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-top:8px}

/* ---------- contextual sidebar ---------- */
.subnav{width:var(--qr-size-sidebar);background:var(--bar);border-right:1px solid var(--border);flex-shrink:0;padding:14px 14px;display:flex;flex-direction:column}
.subnav .head{display:flex;align-items:center;gap:9px;padding:6px 8px 0;min-height:42px}
.subnav .head .name{font-family:var(--sans);font-size:14px;font-weight:600;letter-spacing:-0.01em;color:var(--text)}
.subnav .sep{height:1px;background:var(--border);margin:11px -14px}
.subnav #menu{display:flex;flex-direction:column;gap:3px}
.subnav a{display:block;padding:var(--qr-space-200) var(--qr-space-300);border-radius:var(--qr-radius-control);color:var(--text-muted);text-decoration:none;font-size:var(--qr-font-size-300);font-weight:450;cursor:pointer;transition:background var(--qr-motion-control-duration) var(--qr-motion-control-easing)}
.subnav a:hover{background:var(--hover);color:var(--text)}
.subnav a.active{background:var(--item-active);color:var(--text);font-weight:600}
.subnav a:focus-visible{outline:2px solid var(--qr-color-state-focus-ring);outline-offset:2px}

/* ---------- content ---------- */
.content{flex:1;display:flex;flex-direction:column;min-width:0;align-items:center;justify-content:center;padding:40px;text-align:center}
.content .ph{max-width:400px;color:var(--text-subtle)}
.content .ph .big{font-family:var(--serif);font-size:26px;color:var(--text-muted);font-weight:500;margin-bottom:8px}
.content .ph .small{font-size:13px;line-height:1.5}
.content .ph .pill{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--text-muted);background:var(--hover);border:1px solid var(--border);padding:6px 10px;border-radius:var(--qr-radius-sm)}
#themeToggle{position:fixed;right:20px;bottom:20px;display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:var(--qr-radius-control);border:1px solid var(--qr-color-border-strong);background:var(--bar);color:var(--text);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:-0.005em;box-shadow:0 4px 14px rgba(0,0,0,.16);z-index:50}
#themeToggle:hover{background:var(--hover)}
</style>
</head>
<body>
<div class="app">

  <nav class="rail">
    <div class="stack">
      <button class="prod active" data-p="wp"><span class="sq"><span class="logo wp"></span></span><span class="lbl">WordPress</span></button>
      <button class="prod"        data-p="woo"><span class="sq"><span class="logo woo"></span></span><span class="lbl">Woo</span></button>
      <button class="prod"        data-p="jp"><span class="sq"><span class="logo jp"></span></span><span class="lbl">Jetpack</span></button>
      <button class="prod add" title="Add a plugin you use (e.g. Elementor)"><span class="sq"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span></button>
    </div>
    <div class="acct">M</div>
  </nav>

  <aside class="subnav">
    <div class="head"><span class="name" id="headName">WordPress</span></div>
    <div class="sep"></div>
    <div id="menu"></div>
  </aside>

  <div class="content">
    <div class="ph">
      <div class="big" id="phTitle">WordPress</div>
      <div class="small">The slim rail switches products; this panel is the selected product's own menu. Content lives here — left empty on purpose so we stay on the navigation idea.</div>
      <div class="pill">Click WordPress · Woo · Jetpack →</div>
    </div>
  </div>
</div>

<button id="themeToggle">Switch to dark</button>

<script>
const tBtn = document.getElementById('themeToggle');
function setTheme(mode){
  document.documentElement.setAttribute('data-theme', mode);
  tBtn.textContent = mode === 'dark' ? 'Switch to light' : 'Switch to dark';
}
setTheme(new URLSearchParams(location.search).get('theme') === 'dark' ? 'dark' : 'light');
tBtn.onclick = () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
const DATA = {
  wp:  { name:'WordPress',   items:['Dashboard','Posts','Pages','Media','Comments','Appearance','Plugins','Users','Tools','Settings'] },
  woo: { name:'WooCommerce', items:['Home','Orders','Products','Customers','Analytics','Marketing','Settings','Extensions'] },
  jp:  { name:'Jetpack',     items:['Dashboard','My Plan','Activity Log','Backup','Scan','Stats','Settings'] },
};
const menu = document.getElementById('menu');
function render(p, activeIdx=0){
  const d = DATA[p];
  document.getElementById('headName').textContent = d.name;
  document.getElementById('phTitle').textContent = d.name;
  menu.innerHTML = d.items.map((it,i)=>`<a class="${i===activeIdx?'active':''}">${it}</a>`).join('');
  menu.querySelectorAll('a').forEach(a=>a.onclick=()=>{menu.querySelectorAll('a').forEach(x=>x.classList.remove('active'));a.classList.add('active');});
}
document.querySelectorAll('.prod[data-p]').forEach(el=>{
  el.onclick=()=>{document.querySelectorAll('.prod').forEach(x=>x.classList.remove('active'));el.classList.add('active');render(el.dataset.p);};
});
const start=(new URLSearchParams(location.search).get('p'))||'wp';
document.querySelectorAll('.prod[data-p]').forEach(x=>x.classList.toggle('active', x.dataset.p===start));
render(start);
</script>
</body>
</html>
