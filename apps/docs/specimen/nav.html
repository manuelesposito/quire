<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quire — Navigation concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- the canonical foundation: this nav now CONSUMES @quire/tokens -->
<link rel="stylesheet" href="../../../packages/tokens/dist/css/variables.css">
<link rel="stylesheet" href="../../../packages/tokens/dist/css/dark.css">
<link rel="stylesheet" href="workbench.css">
<link rel="stylesheet" href="components.css">
<style>
:root{
  /* local aliases mapped onto the token foundation — used by this page's own chrome */
  --canvas:      var(--qr-color-surface-canvas);
  --bar:         var(--qr-color-surface-nav);
  --hover:       var(--qr-color-state-hover);
  --text:        var(--qr-color-text-default);
  --text-muted:  var(--qr-color-text-muted);
  --text-subtle: var(--qr-color-text-subtle);
  --border:      var(--qr-color-border-default);
  --sans:        var(--qr-font-family-sans);
  --mono:        var(--qr-font-family-mono);
  --serif:       var(--qr-font-family-serif);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--text);background:var(--canvas);font-size:var(--qr-font-size-400);line-height:var(--qr-font-line-height-normal);letter-spacing:var(--qr-font-letter-spacing-normal);-webkit-font-smoothing:antialiased}
.app{display:flex;height:calc(100vh - var(--wb-h));overflow:hidden}
/* product rail + contextual sidebar + marks live in components.css */
/* TRIAL: icon-only admin bar — labels drop away, names live in the tooltip. */
.rail{width:62px;padding-top:12px}
.prod .lbl{display:none}
.prod{padding:0}                 /* tighten: the square is the whole target */
.rail .stack{gap:6px}            /* icons closer together */
/* panel header: title sits dead-level with the WordPress icon (both centres at
   12 + 21 = 33px), balanced padding, collapse control on the right. */
.subnav{padding-top:12px;overflow:hidden;transition:width var(--qr-duration-base) var(--qr-easing-standard),opacity var(--qr-duration-fast) var(--qr-easing-standard)}
.subnav .head{height:42px;min-height:0;padding:0 10px 0 12px;justify-content:space-between}
.head__toggle{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:0;background:none;color:var(--qr-color-text-subtle);cursor:pointer;border-radius:var(--qr-radius-sm)}
.head__toggle:hover{background:var(--qr-color-state-hover);color:var(--qr-color-text-muted)}
.head__toggle svg{width:17px;height:17px}
/* focus mode — collapse leaves only the rail; clicking any rail item re-expands */
.app.collapsed .subnav{width:0;padding-left:0;padding-right:0;opacity:0;pointer-events:none}
body.demo-tips .tip{opacity:1;transform:translateY(-50%) translateX(0)}
.content{flex:1;display:flex;flex-direction:column;min-width:0;align-items:center;justify-content:center;padding:40px;text-align:center}
.content .ph{max-width:400px;color:var(--text-subtle)}
.content .ph .big{font-family:var(--serif);font-size:26px;color:var(--text-muted);font-weight:500;margin-bottom:8px}
.content .ph .small{font-size:13px;line-height:1.5}
.content .ph .pill{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--text-muted);background:var(--hover);border:1px solid var(--border);padding:6px 10px;border-radius:var(--qr-radius-sm)}
#themeToggle{position:fixed;right:20px;bottom:20px;display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:var(--qr-radius-control);border:1px solid var(--qr-color-border-strong);background:var(--bar);color:var(--text);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:-0.005em;box-shadow:0 4px 14px rgba(0,0,0,.16);z-index:50}
#themeToggle:hover{background:var(--hover)}
</style>
</head>
<body>
<div class="app">

  <nav class="rail">
    <div class="stack">
      <button class="prod active has-tip" data-p="wp"><span class="sq"><span class="logo wp"></span></span><span class="tip">WordPress <span class="kbd">⌘1</span></span></button>
      <button class="prod has-tip"        data-p="woo"><span class="sq"><span class="logo woo"></span></span><span class="tip">WooCommerce <span class="kbd">⌘2</span></span></button>
      <button class="prod has-tip"        data-p="jp"><span class="sq"><span class="logo jp"></span></span><span class="tip">Jetpack <span class="kbd">⌘3</span></span></button>
      <button class="prod add has-tip"><span class="sq"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span><span class="tip">Add a product</span></button>
    </div>
    <div class="acct has-tip">M<span class="tip">Account</span></div>
  </nav>

  <aside class="subnav">
    <div class="head">
      <span class="name" id="headName">WordPress</span>
      <button class="head__toggle" id="menuToggle" title="Collapse menu" aria-label="Collapse menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9.5" y1="4" x2="9.5" y2="20"/></svg>
      </button>
    </div>
    <div class="sep"></div>
    <div id="menu"></div>
  </aside>

  <div class="content">
    <div class="ph">
      <div class="big" id="phTitle">WordPress</div>
      <div class="small">The slim rail switches products; this panel is the selected product's own menu. Content lives here — left empty on purpose so we stay on the navigation idea.</div>
      <div class="pill">Click WordPress · Woo · Jetpack →</div>
    </div>
  </div>
</div>


<script>

const DATA = {
  wp:  { name:'WordPress',   items:['Dashboard','Posts','Pages','Media','Comments','Appearance','Plugins','Users','Tools','Settings'] },
  woo: { name:'WooCommerce', items:['Home','Orders','Products','Customers','Analytics','Marketing','Settings','Extensions'] },
  jp:  { name:'Jetpack',     items:['Dashboard','My Plan','Activity Log','Backup','Scan','Stats','Settings'] },
};
const menu = document.getElementById('menu');
function render(p, activeIdx=0){
  const d = DATA[p];
  document.getElementById('headName').textContent = d.name;
  document.getElementById('phTitle').textContent = d.name;
  menu.innerHTML = d.items.map((it,i)=>`<a class="${i===activeIdx?'active':''}">${it}</a>`).join('');
  menu.querySelectorAll('a').forEach(a=>a.onclick=()=>{menu.querySelectorAll('a').forEach(x=>x.classList.remove('active'));a.classList.add('active');});
}
document.querySelectorAll('.prod[data-p]').forEach(el=>{
  el.onclick=()=>{document.querySelectorAll('.prod').forEach(x=>x.classList.remove('active'));el.classList.add('active');render(el.dataset.p);};
});
const start=(new URLSearchParams(location.search).get('p'))||'wp';
document.querySelectorAll('.prod[data-p]').forEach(x=>x.classList.toggle('active', x.dataset.p===start));
render(start);

// focus mode — the header control collapses the menu panel; clicking ANY rail
// item (product, +, or account) brings it back, like Figma's collapsed pill.
const app=document.querySelector('.app');
document.getElementById('menuToggle').addEventListener('click',()=>app.classList.add('collapsed'));
document.querySelector('.rail').addEventListener('click',()=>app.classList.remove('collapsed'));
// review aids (hover-only states are hard to see otherwise)
const q=new URLSearchParams(location.search);
if(q.has('tips')) document.body.classList.add('demo-tips');
if(q.has('collapsed')) app.classList.add('collapsed');
</script>
<script src="workbench.js"></script>
</body>
</html>
