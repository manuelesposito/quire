<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quire — Navigation concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#E8E5DC;            /* the page */
  --bar:#F1EDE4;               /* BOTH sidebars share one colour (connected) */
  --item-active:#E4DFD3;
  --hover:rgba(0,0,0,.045);
  --text:#211C14; --text-muted:#6C6457; --text-subtle:#9A8F7F;
  --border:#DCD5C8;
  --ochre-soft:#F1DEA0; --ochre:#CF9A2E;
  --sans:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace; --serif:'Newsreader',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--text);background:var(--canvas);font-size:13.5px;line-height:1.45;letter-spacing:-0.006em;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}

/* ---------- product rail ---------- */
.rail{width:78px;background:var(--bar);display:flex;flex-direction:column;align-items:center;padding:10px 0 14px;flex-shrink:0}
.rail .stack{display:flex;flex-direction:column;gap:4px;width:100%;align-items:center;flex:1}
.prod{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:0;cursor:pointer;padding:5px 0;width:100%;color:inherit}
.prod .sq{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.prod .sq img{height:23px;width:auto;display:block;pointer-events:none}
.prod .lbl{font-size:9.5px;color:var(--text-subtle);letter-spacing:.01em}
.prod:hover .sq{background:var(--hover)}
.prod.active .sq{background:var(--ochre-soft)}
.prod.active .lbl{color:var(--text);font-weight:500}
/* quiet add button, Figma-style — no dashed box */
.add .sq{color:var(--text-subtle)}
.add:hover .sq{background:var(--hover);color:var(--text-muted)}
.add svg{width:18px;height:18px}
.rail .acct{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#C9A24A,#A85F3C);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-top:8px}

/* ---------- contextual sidebar (same colour, connected) ---------- */
.subnav{width:236px;background:var(--bar);border-right:1px solid var(--border);flex-shrink:0;padding:16px 14px;display:flex;flex-direction:column}
.subnav .head{display:flex;align-items:center;gap:9px;padding:4px 8px 0}
.subnav .head img{height:19px;width:auto}
.subnav .head .name{font-family:var(--serif);font-size:19px;font-weight:500}
.subnav .sep{height:1px;background:var(--border);margin:13px 8px 12px}
.subnav a{display:block;padding:7px 10px;border-radius:7px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:450;cursor:pointer}
.subnav a:hover{background:var(--hover);color:var(--text)}
.subnav a.active{background:var(--item-active);color:var(--text);font-weight:600}

/* ---------- content ---------- */
.content{flex:1;display:flex;flex-direction:column;min-width:0;align-items:center;justify-content:center;padding:40px;text-align:center}
.content .ph{max-width:400px;color:var(--text-subtle)}
.content .ph .big{font-family:var(--serif);font-size:26px;color:var(--text-muted);font-weight:500;margin-bottom:8px}
.content .ph .small{font-size:13px;line-height:1.5}
.content .ph .pill{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--text-muted);background:#0000000a;border:1px solid var(--border);padding:6px 10px;border-radius:6px}
</style>
</head>
<body>
<div class="app">

  <!-- PRODUCT RAIL — WordPress is first & default; no brand mark -->
  <nav class="rail">
    <div class="stack" id="rail">
      <button class="prod active" data-p="wp"><span class="sq"><img src="logos/wp.svg" alt=""></span><span class="lbl">WordPress</span></button>
      <button class="prod"        data-p="woo"><span class="sq"><img src="logos/woo.svg" alt=""></span><span class="lbl">Woo</span></button>
      <button class="prod"        data-p="jp"><span class="sq"><img src="logos/jetpack-real.svg" alt=""></span><span class="lbl">Jetpack</span></button>
      <button class="prod add" title="Add a plugin you use (e.g. Elementor)"><span class="sq"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span></button>
    </div>
    <div class="acct">M</div>
  </nav>

  <!-- CONTEXTUAL SIDEBAR -->
  <aside class="subnav">
    <div class="head"><img id="headLogo" src="logos/wp.svg" alt=""><span class="name" id="headName">WordPress</span></div>
    <div class="sep"></div>
    <div id="menu"></div>
  </aside>

  <!-- CONTENT (kept minimal — nav focus) -->
  <div class="content">
    <div class="ph">
      <div class="big" id="phTitle">WordPress</div>
      <div class="small">The slim rail switches products; this panel is the selected product's own menu. Content lives here — left empty on purpose so we stay on the navigation idea.</div>
      <div class="pill">Click WordPress · Woo · Jetpack →</div>
    </div>
  </div>
</div>

<script>
const DATA = {
  wp:  { name:'WordPress',   logo:'logos/wp.svg',
         items:['Dashboard','Posts','Pages','Media','Comments','Appearance','Plugins','Users','Tools','Settings'] },
  woo: { name:'WooCommerce', logo:'logos/woo.svg',
         items:['Home','Orders','Products','Customers','Analytics','Marketing','Settings','Extensions'] },
  jp:  { name:'Jetpack',     logo:'logos/jetpack-real.svg',
         items:['Dashboard','My Plan','Activity Log','Backup','Scan','Stats','Settings'] },
};
const menu = document.getElementById('menu');
function render(p, activeIdx=0){
  const d = DATA[p];
  document.getElementById('headName').textContent = d.name;
  document.getElementById('headLogo').src = d.logo;
  document.getElementById('phTitle').textContent = d.name;
  menu.innerHTML = d.items.map((it,i)=>`<a class="${i===activeIdx?'active':''}">${it}</a>`).join('');
  menu.querySelectorAll('a').forEach(a=>a.onclick=()=>{menu.querySelectorAll('a').forEach(x=>x.classList.remove('active'));a.classList.add('active');});
}
document.querySelectorAll('.prod[data-p]').forEach(el=>{
  el.onclick=()=>{document.querySelectorAll('.prod').forEach(x=>x.classList.remove('active'));el.classList.add('active');render(el.dataset.p);};
});
const start=(new URLSearchParams(location.search).get('p'))||'wp';
document.querySelectorAll('.prod[data-p]').forEach(x=>x.classList.toggle('active', x.dataset.p===start));
render(start);
</script>
</body>
</html>
