<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quire — Tokens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../packages/tokens/dist/css/variables.css">
<link rel="stylesheet" href="../../../packages/tokens/dist/css/dark.css">
<link rel="stylesheet" href="workbench.css">
<style>
/* Tokens — a Variables browser (Figma's bones, Quire's skin).
   Collections → Groups → a live Name/value table. Every value is read
   RESOLVED from @quire/tokens, so the sheet can never drift, and it
   re-reads when the theme flips. */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--qr-font-family-sans);background:var(--qr-color-surface-canvas);color:var(--qr-color-text-default);font-size:var(--qr-font-size-300);line-height:var(--qr-font-line-height-copy);letter-spacing:var(--qr-font-letter-spacing-normal);-webkit-font-smoothing:antialiased;overflow:hidden}

.vapp{display:flex;height:calc(100vh - var(--wb-h))}

/* ---- left: collections + groups ---- */
.vside{width:266px;flex-shrink:0;display:flex;flex-direction:column;background:var(--qr-color-surface-nav);border-right:1px solid var(--qr-color-border-default)}
.vside__head{padding:16px 16px 14px;border-bottom:1px solid var(--qr-color-border-default)}
.vfile{font-family:var(--qr-font-family-sans);font-weight:var(--qr-font-weight-medium);font-size:var(--qr-font-size-600);letter-spacing:var(--qr-font-letter-spacing-tight);line-height:1.1}
.vsrc{font-family:var(--qr-font-family-sans);font-size:var(--qr-font-size-100);color:var(--qr-color-text-subtle);margin-top:3px}
.vside__scroll{overflow-y:auto;flex:1;padding:10px 8px 24px}
.vlabel{font-family:var(--qr-font-family-sans);font-size:var(--qr-font-size-200);font-weight:var(--qr-font-weight-semibold);color:var(--qr-color-text-muted);padding:14px 10px 6px}
.vlabel:first-child{padding-top:4px}
.vitem{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 10px;border-radius:var(--qr-radius-sm);cursor:pointer;color:var(--qr-color-text-default);user-select:none}
.vitem:hover{background:var(--qr-color-state-hover)}
.vitem.is-active{background:var(--qr-color-state-active-surface);font-weight:var(--qr-font-weight-medium)}
.vitem .vc{font-family:var(--qr-font-family-sans);font-size:var(--qr-font-size-200);color:var(--qr-color-text-subtle)}
.vrule{height:1px;background:var(--qr-color-border-default);margin:8px 6px}

/* ---- right: the variables table ---- */
.vmain{flex:1;display:flex;flex-direction:column;min-width:0}
.vmain__head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;padding:18px 24px 16px;border-bottom:1px solid var(--qr-color-border-default)}
.vmain__head h1{font-family:var(--qr-font-family-sans);font-weight:var(--qr-font-weight-medium);font-size:var(--qr-font-size-700);letter-spacing:var(--qr-font-letter-spacing-tight);line-height:1.1}
.vmain__head p{font-size:var(--qr-font-size-300);color:var(--qr-color-text-muted);margin-top:5px;max-width:62ch}
.vcount{font-family:var(--qr-font-family-sans);font-size:var(--qr-font-size-200);color:var(--qr-color-text-subtle);white-space:nowrap}
.vtable{overflow-y:auto;flex:1}

.vghead{font-family:var(--qr-font-family-sans);font-size:var(--qr-font-size-200);font-weight:var(--qr-font-weight-semibold);color:var(--qr-color-text-muted);padding:16px 24px 6px;position:sticky;top:0;background:var(--qr-color-surface-canvas);z-index:1}

.vrow{display:grid;grid-template-columns:44px minmax(150px,250px) 116px 1fr;gap:18px;align-items:center;padding:9px 24px;border-top:1px solid var(--qr-color-border-default);min-height:46px}
.vrow:hover{background:var(--qr-color-state-hover)}
.vp{display:flex;align-items:center;justify-content:center;color:var(--qr-color-text-muted);font-size:var(--qr-font-size-300)}
.vn{font-family:var(--qr-font-family-sans);font-size:var(--qr-font-size-200);color:var(--qr-color-text-default);overflow-wrap:anywhere}
.vv{font-family:var(--qr-font-family-sans);font-size:11px;color:var(--qr-color-text-subtle)}
.vdemo{min-width:0;overflow:hidden}

.vsw{width:26px;height:26px;border-radius:var(--qr-radius-sm);border:1px solid var(--qr-color-border-default)}
.vband{display:block;height:26px;width:100%;max-width:340px;border-radius:var(--qr-radius-sm);border:1px solid var(--qr-color-border-default)}
.vsample{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vbar{display:block;height:16px;background:var(--qr-color-accent-default);border-radius:2px;max-width:100%}
.vrad{height:38px;width:60px;background:var(--qr-color-surface-sunken);border:1px solid var(--qr-color-border-strong)}
.vshadow{display:block;height:34px;width:80px;border-radius:var(--qr-radius-sm);background:var(--qr-color-surface-raised);border:1px solid var(--qr-color-border-default)}
.vlh{font-size:var(--qr-font-size-200);color:var(--qr-color-text-muted);max-width:280px;display:block;overflow:hidden}

/* ---- legibility rows (the WCAG view) ---- */
.crow{display:grid;grid-template-columns:minmax(160px,1fr) 180px 72px auto;gap:18px;align-items:center;padding:9px 24px;border-top:1px solid var(--qr-color-border-default)}
.crow .clabel{font-size:var(--qr-font-size-300)}
.cchip{height:34px;border-radius:var(--qr-radius-sm);display:flex;align-items:center;justify-content:center;font-size:var(--qr-font-size-300);font-weight:var(--qr-font-weight-medium);border:1px solid var(--qr-color-border-default)}
.cratio{font-family:var(--qr-font-family-sans);font-size:var(--qr-font-size-200);color:var(--qr-color-text-muted)}
.cbadge{justify-self:start;font-family:var(--qr-font-family-sans);font-size:var(--qr-font-size-100);font-weight:var(--qr-font-weight-semibold);padding:2px 9px;border-radius:var(--qr-radius-full)}
.cbadge.ok{background:var(--qr-color-feedback-success-surface);color:var(--qr-color-feedback-success-text)}
.cbadge.warn{background:var(--qr-color-feedback-warning-surface);color:var(--qr-color-feedback-warning-text)}
.cbadge.bad{background:var(--qr-color-feedback-danger-surface);color:var(--qr-color-feedback-danger-text)}

#probe{position:absolute;visibility:hidden;pointer-events:none;left:-9999px;top:0}
</style>
</head>
<body>
<div class="vapp">
  <aside class="vside">
    <div class="vside__head">
      <div class="vfile">Tokens</div>
      <div class="vsrc">@quire/tokens · live</div>
    </div>
    <div class="vside__scroll">
      <div class="vlabel">Collections</div>
      <div id="collections"></div>
      <div class="vrule"></div>
      <div class="vlabel">Groups</div>
      <div id="groups"></div>
    </div>
  </aside>
  <main class="vmain">
    <div class="vmain__head">
      <div>
        <h1 id="colName">Color</h1>
        <p id="colNote"></p>
      </div>
      <div class="vcount" id="colCount"></div>
    </div>
    <div class="vtable" id="rows"></div>
  </main>
</div>

<span id="probe"></span>
<script src="workbench.js"></script>
<script>
(function(){
  var probe = document.getElementById('probe');
  function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
  function resolveColor(v){ probe.style.background=''; probe.style.background='var('+v+')'; return getComputedStyle(probe).backgroundColor; }
  function resolveLen(v){ probe.style.width='var('+v+')'; return getComputedStyle(probe).width; }
  function resolveWeight(v){ probe.style.fontWeight='var('+v+')'; return getComputedStyle(probe).fontWeight; }
  function firstFamily(v){ var s=cssVar(v); return s.split(',')[0].replace(/["']/g,'').trim(); }
  function hex(rgb){
    var m = rgb.match(/[\d.]+/g); if(!m) return rgb;
    if(m.length>=4 && +m[3] < 1) return 'rgba('+m.slice(0,4).join(', ')+')';
    return '#'+m.slice(0,3).map(function(x){return (+x).toString(16).padStart(2,'0');}).join('');
  }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ---------- the data: collections -> groups -> rows ----------
  function colorRows(fam, steps){ return steps.map(function(s){ return {kind:'color', label:fam+'.'+s, v:'--qr-color-'+fam+'-'+s}; }); }
  function semRows(grp, roles){ return roles.map(function(r){ return {kind:'color', label:grp+'.'+r, v:'--qr-color-'+grp+'-'+r}; }); }

  var COLLECTIONS = [
    { id:'color', name:'Color',
      note:'Primitive ramps are the raw pigments; semantic roles are what components actually use. Change a role and the whole system moves. Roles remap in dark.',
      groups:[
        {id:'background', name:'Background', rows:colorRows('background',[100,200])},
        {id:'gray',       name:'Gray',       rows:colorRows('gray',[100,200,300,400,500,600,700,800,900,1000])},
        {id:'gray-alpha', name:'Gray alpha', rows:colorRows('gray-alpha',[100,200,300,400,500,600,700,800,900,1000])},
        {id:'green',      name:'Green',      rows:colorRows('green',[100,300,400,600,700,900])},
        {id:'red',        name:'Red',        rows:colorRows('red',[100,300,400,600,700,800,900])},
        {id:'amber',      name:'Amber',      rows:colorRows('amber',[100,300,400,600,700,900])},
        {id:'blue',       name:'Blue',       rows:colorRows('blue',[100,300,400,600,700,900])},
        {id:'text',    name:'Text',    rows:semRows('text',['default','muted','subtle','inverse','accent','on-accent'])},
        {id:'surface', name:'Surface', rows:semRows('surface',['canvas','raised','nav','sunken','inverse'])},
        {id:'border',  name:'Border',  rows:semRows('border',['default','strong'])},
        {id:'accent',  name:'Accent',  rows:semRows('accent',['soft','default','strong','deep'])},
        {id:'action',  name:'Action',  rows:semRows('action',['primary-default','primary-hover','primary-text','secondary-border','secondary-text','tertiary-text','destructive-default','destructive-hover','destructive-text'])},
        {id:'state',   name:'State',   rows:semRows('state',['hover','active-surface','selected-surface','selected-mark','focus-ring'])},
        {id:'control', name:'Control', rows:semRows('control',['on','on-fg'])},
        {id:'feedback',name:'Feedback',rows:semRows('feedback',['success-surface','success-border','success-text','warning-surface','warning-border','warning-text','danger-surface','danger-border','danger-text','info-surface','info-border','info-text'])}
      ]},
    { id:'type', name:'Typography',
      note:'Named text styles, the size scale they are built from, and the families, weights and spacing beneath them.',
      groups:[
        {id:'styles', name:'Text styles', rows:['display','page-title','section','body','body-sm','label','caption','code'].map(function(r){return {kind:'style', role:r};})},
        {id:'scale',  name:'Type scale',  rows:[100,200,300,400,500,600,700,800,900].map(function(s){return {kind:'fontsize', step:s};})},
        {id:'family', name:'Families',    rows:['sans','code'].map(function(k){return {kind:'family', key:k};})},
        {id:'weight', name:'Weights',     rows:['regular','medium','semibold','bold'].map(function(k){return {kind:'weight', key:k};})},
        {id:'lh',     name:'Line height', rows:['tight','label','snug','copy','relaxed'].map(function(k){return {kind:'lh', key:k};})},
        {id:'ls',     name:'Letter spacing', rows:['tight','normal'].map(function(k){return {kind:'ls', key:k};})}
      ]},
    { id:'space', name:'Spacing',
      note:'A 4px-based scale. All padding, gaps and borders use only these steps.',
      groups:[{id:'space', name:'Spacing', rows:[0,50,100,200,300,400,500,600,800,1000,1200,1600].map(function(s){return {kind:'space', step:s};})}]},
    { id:'radius', name:'Radius',
      note:'Corner radii, from square to pill.',
      groups:[{id:'radius', name:'Radius', rows:['none','xs','sm','md','lg','full'].map(function(k){return {kind:'radius', key:k};})}]},
    { id:'size', name:'Sizing',
      note:'Fixed sizes for controls, icons and the layout rails.',
      groups:[{id:'size', name:'Sizing', rows:['control-sm','control-md','control-lg','icon-sm','icon-md','rail','sidebar'].map(function(k){return {kind:'size', key:k};})}]},
    { id:'motion', name:'Motion',
      note:'Durations and easings — calm, quick and the same everywhere.',
      groups:[{id:'motion', name:'Motion', rows:[
        {kind:'motion', label:'duration-fast', v:'--qr-duration-fast'},
        {kind:'motion', label:'duration-base', v:'--qr-duration-base'},
        {kind:'motion', label:'easing-standard', v:'--qr-easing-standard'},
        {kind:'motion', label:'motion-control-duration', v:'--qr-motion-control-duration'},
        {kind:'motion', label:'motion-control-easing', v:'--qr-motion-control-easing'}
      ]}]},
    { id:'effects', name:'Effects',
      note:'The only shadows in the system — raised cards and floating overlays. Everything else separates with a hairline.',
      groups:[{id:'effects', name:'Elevation', rows:[
        {kind:'shadow', label:'elevation-raised', v:'--qr-elevation-raised'},
        {kind:'shadow', label:'elevation-overlay', v:'--qr-elevation-overlay'}
      ]}]},
    { id:'contrast', name:'Legibility',
      note:'Every text-on-surface pair a real screen uses, scored against WCAG AA — normal text needs 4.5:1, large/heavy text 3:1. Flip dark in the bar to re-check.',
      unit:'checks',
      groups:[{id:'contrast', name:'Contrast', rows:[
        ['Body text · on canvas',   '--qr-color-text-default',            '--qr-color-surface-canvas'],
        ['Body text · on raised',   '--qr-color-text-default',            '--qr-color-surface-raised'],
        ['Muted text · on canvas',  '--qr-color-text-muted',              '--qr-color-surface-canvas'],
        ['Subtle text · on canvas', '--qr-color-text-subtle',             '--qr-color-surface-canvas'],
        ['Link / accent · on paper','--qr-color-accent-strong',           '--qr-color-surface-canvas'],
        ['Primary button',          '--qr-color-action-primary-text',     '--qr-color-action-primary-default'],
        ['Destructive button',      '--qr-color-action-destructive-text', '--qr-color-action-destructive-default'],
        ['Checkbox check',          '--qr-color-control-on-fg',           '--qr-color-control-on'],
        ['Highlight (accent-soft)', '--qr-color-text-default',            '--qr-color-accent-soft'],
        ['Success notice',          '--qr-color-feedback-success-text',   '--qr-color-feedback-success-surface'],
        ['Warning notice',          '--qr-color-feedback-warning-text',   '--qr-color-feedback-warning-surface'],
        ['Danger notice',           '--qr-color-feedback-danger-text',    '--qr-color-feedback-danger-surface'],
        ['Info notice',             '--qr-color-feedback-info-text',      '--qr-color-feedback-info-surface']
      ].map(function(p){return {kind:'contrast', label:p[0], fg:p[1], bg:p[2]};})}]}
  ];

  function countOf(col){ return col.groups.reduce(function(n,g){return n+g.rows.length;},0); }

  // ---------- WCAG ----------
  function parseRGB(s){ var m=s.match(/[\d.]+/g); return m ? m.slice(0,3).map(Number) : [0,0,0]; }
  function relLum(rgb){ var a=rgb.map(function(v){ v/=255; return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055,2.4); }); return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2]; }
  function ratio(fg,bg){ var L1=relLum(parseRGB(fg)), L2=relLum(parseRGB(bg)); var hi=Math.max(L1,L2),lo=Math.min(L1,L2); return (hi+0.05)/(lo+0.05); }

  // ---------- row rendering ----------
  function rowHTML(row){
    switch(row.kind){
      case 'color': {
        var h = hex(resolveColor(row.v));
        return '<div class="vrow"><span class="vp"><span class="vsw" style="background:var('+row.v+')"></span></span>'+
          '<span class="vn">'+row.label+'</span><span class="vv">'+h+'</span>'+
          '<span class="vdemo"><span class="vband" style="background:var('+row.v+')"></span></span></div>';
      }
      case 'style': {
        var base='--qr-text-'+row.role;
        var size=resolveLen(base+'-size'), w=resolveWeight(base+'-weight'), fam=firstFamily(base+'-family');
        var st='font-family:var('+base+'-family);font-size:var('+base+'-size);font-weight:var('+base+'-weight);line-height:var('+base+'-line-height);letter-spacing:var('+base+'-letter-spacing)';
        var sample = row.role==='code' ? 'add_filter( … )' : 'The quick brown fox';
        return '<div class="vrow"><span class="vp" style="font-family:var('+base+'-family);font-weight:var('+base+'-weight)">Aa</span>'+
          '<span class="vn">text.'+row.role+'</span><span class="vv">'+fam+' · '+size+' · '+w+'</span>'+
          '<span class="vdemo"><span class="vsample" style="'+st+'">'+sample+'</span></span></div>';
      }
      case 'fontsize': {
        var v=resolveLen('--qr-font-size-'+row.step);
        return '<div class="vrow"><span class="vp" style="font-size:var(--qr-font-size-100)">A</span>'+
          '<span class="vn">font-size-'+row.step+'</span><span class="vv">'+v+'</span>'+
          '<span class="vdemo"><span class="vsample" style="font-size:var(--qr-font-size-'+row.step+');line-height:1.1">Aa Settings</span></span></div>';
      }
      case 'family': {
        var fam=firstFamily('--qr-font-family-'+row.key);
        return '<div class="vrow"><span class="vp" style="font-family:var(--qr-font-family-'+row.key+')">Aa</span>'+
          '<span class="vn">font-family-'+row.key+'</span><span class="vv">'+esc(fam)+'</span>'+
          '<span class="vdemo"><span class="vsample" style="font-family:var(--qr-font-family-'+row.key+');font-size:var(--qr-font-size-500)">The quick brown fox</span></span></div>';
      }
      case 'weight': {
        var w2=resolveWeight('--qr-font-weight-'+row.key);
        return '<div class="vrow"><span class="vp" style="font-weight:var(--qr-font-weight-'+row.key+')">Aa</span>'+
          '<span class="vn">font-weight-'+row.key+'</span><span class="vv">'+w2+'</span>'+
          '<span class="vdemo"><span class="vsample" style="font-weight:var(--qr-font-weight-'+row.key+');font-size:var(--qr-font-size-500)">The quick brown fox</span></span></div>';
      }
      case 'lh': {
        var lhv=cssVar('--qr-font-line-height-'+row.key);
        return '<div class="vrow"><span class="vp">≡</span>'+
          '<span class="vn">line-height-'+row.key+'</span><span class="vv">'+lhv+'</span>'+
          '<span class="vdemo"><span class="vlh" style="line-height:var(--qr-font-line-height-'+row.key+')">Bind the loose pages<br>into one quire.</span></span></div>';
      }
      case 'ls': {
        var lsv=cssVar('--qr-font-letter-spacing-'+row.key);
        return '<div class="vrow"><span class="vp">A A</span>'+
          '<span class="vn">letter-spacing-'+row.key+'</span><span class="vv">'+lsv+'</span>'+
          '<span class="vdemo"><span class="vsample" style="letter-spacing:var(--qr-font-letter-spacing-'+row.key+')">Letter spacing</span></span></div>';
      }
      case 'space': {
        var sv=resolveLen('--qr-space-'+row.step);
        return '<div class="vrow"><span class="vp">·</span>'+
          '<span class="vn">space-'+row.step+'</span><span class="vv">'+sv+'</span>'+
          '<span class="vdemo"><span class="vbar" style="width:var(--qr-space-'+row.step+')"></span></span></div>';
      }
      case 'radius': {
        var rv=resolveLen('--qr-radius-'+row.key);
        return '<div class="vrow"><span class="vp">◢</span>'+
          '<span class="vn">radius-'+row.key+'</span><span class="vv">'+(row.key==='full'?'9999px':rv)+'</span>'+
          '<span class="vdemo"><span class="vrad" style="border-radius:var(--qr-radius-'+row.key+')"></span></span></div>';
      }
      case 'size': {
        var zv=resolveLen('--qr-size-'+row.key);
        return '<div class="vrow"><span class="vp">↔</span>'+
          '<span class="vn">size-'+row.key+'</span><span class="vv">'+zv+'</span>'+
          '<span class="vdemo"><span class="vbar" style="width:var(--qr-size-'+row.key+');background:var(--qr-color-border-strong)"></span></span></div>';
      }
      case 'motion': {
        var mv=cssVar(row.v);
        return '<div class="vrow"><span class="vp">⎜</span>'+
          '<span class="vn">'+row.label+'</span><span class="vv">'+esc(mv)+'</span>'+
          '<span class="vdemo"></span></div>';
      }
      case 'shadow': {
        return '<div class="vrow"><span class="vp">■</span>'+
          '<span class="vn">'+row.label+'</span><span class="vv">shadow</span>'+
          '<span class="vdemo"><span class="vshadow" style="box-shadow:var('+row.v+')"></span></span></div>';
      }
      case 'contrast': {
        var fg=resolveColor(row.fg), bg=resolveColor(row.bg), r=ratio(fg,bg);
        var grade = r>=4.5 ? ['ok','AA'] : (r>=3 ? ['warn','AA Large'] : ['bad','Fails']);
        return '<div class="crow"><span class="clabel">'+row.label+'</span>'+
          '<span class="cchip" style="color:var('+row.fg+');background:var('+row.bg+')">Sample text</span>'+
          '<span class="cratio">'+r.toFixed(2)+':1</span>'+
          '<span class="cbadge '+grade[0]+'">'+grade[1]+'</span></div>';
      }
    }
    return '';
  }

  // ---------- state + render ----------
  var current = 'color', currentGroup = 'all';
  var colEl=document.getElementById('collections'), grpEl=document.getElementById('groups'),
      rowsEl=document.getElementById('rows'),
      nameEl=document.getElementById('colName'), noteEl=document.getElementById('colNote'), countEl=document.getElementById('colCount');

  function find(id){ return COLLECTIONS.filter(function(c){return c.id===id;})[0]; }

  function renderCollections(){
    colEl.innerHTML = COLLECTIONS.map(function(c){
      return '<div class="vitem'+(c.id===current?' is-active':'')+'" data-col="'+c.id+'">'+
        '<span>'+c.name+'</span><span class="vc">'+countOf(c)+'</span></div>';
    }).join('');
  }
  function renderGroups(){
    var col=find(current);
    var items=[{id:'all', name:'All', n:countOf(col)}].concat(col.groups.map(function(g){return {id:g.id, name:g.name, n:g.rows.length};}));
    grpEl.innerHTML = items.map(function(g){
      return '<div class="vitem'+(g.id===currentGroup?' is-active':'')+'" data-grp="'+g.id+'">'+
        '<span>'+g.name+'</span><span class="vc">'+g.n+'</span></div>';
    }).join('');
  }
  function renderTable(){
    var col=find(current);
    nameEl.textContent=col.name;
    noteEl.textContent=col.note;
    countEl.textContent=countOf(col)+' '+(col.unit||'variables');
    var groups = currentGroup==='all' ? col.groups : col.groups.filter(function(g){return g.id===currentGroup;});
    var showHeads = currentGroup==='all' && col.groups.length>1;
    var html='';
    groups.forEach(function(g){
      if(showHeads) html+='<div class="vghead">'+g.name+'</div>';
      g.rows.forEach(function(r){ html+=rowHTML(r); });
    });
    rowsEl.innerHTML=html;
    rowsEl.scrollTop=0;
  }
  function renderAll(){ renderCollections(); renderGroups(); renderTable(); }

  function syncHash(){ history.replaceState(null,'', '#'+current+(currentGroup!=='all'?'/'+currentGroup:'')); }
  function fromHash(){
    var parts=(location.hash||'').replace(/^#/,'').split('/');
    if(parts[0] && find(parts[0])){
      current=parts[0];
      var col=find(current);
      currentGroup = (parts[1] && col.groups.some(function(g){return g.id===parts[1];})) ? parts[1] : 'all';
    }
  }

  colEl.addEventListener('click', function(e){
    var t=e.target.closest('[data-col]'); if(!t) return;
    current=t.getAttribute('data-col'); currentGroup='all'; syncHash(); renderAll();
  });
  grpEl.addEventListener('click', function(e){
    var t=e.target.closest('[data-grp]'); if(!t) return;
    currentGroup=t.getAttribute('data-grp'); syncHash(); renderGroups(); renderTable();
  });

  fromHash();
  renderAll();

  // re-resolve everything when the theme flips (semantic colours remap)
  new MutationObserver(function(){ renderTable(); })
    .observe(document.documentElement, { attributes:true, attributeFilter:['data-theme'] });
})();
</script>
</body>
</html>
